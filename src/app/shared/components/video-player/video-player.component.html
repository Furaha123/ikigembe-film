<div class="vp-wrapper"
     tabindex="0"
     (mousemove)="onMouseMove()"
     (mouseleave)="onMouseLeave()"
     (dblclick)="toggleFullscreen()"
     (keydown)="onKeyDown($event)"
     (contextmenu)="$event.preventDefault()"
     [class.vp-fullscreen]="fullscreen()">

  <video #videoEl
    class="vp-video"
    [poster]="poster"
    preload="metadata"
    controlsList="nodownload nofullscreen noremoteplayback"
    disablePictureInPicture
    playsinline
    (click)="togglePlay()">
    <track kind="captions" />
  </video>

  <!-- Controls overlay -->
  <div class="vp-controls" [class.vp-controls--hidden]="!showControls()">

    <!-- Progress bar -->
    <div class="vp-progress">
      <div class="vp-progress__buffered" [style.width.%]="buffered()"></div>
      <div class="vp-progress__filled"
           [style.width.%]="progress()"
           [style.background]="accentColor">
      </div>
      <input class="vp-progress__input"
             type="range" min="0" [max]="duration()" step="1"
             [value]="currentTime()"
             aria-label="Seek"
             (input)="onSeekInput($event)"
             (keydown)="onProgressKeyDown($event)" />
    </div>

    <!-- Bottom bar -->
    <div class="vp-bar">
      <!-- Left controls -->
      <div class="vp-bar__left">
        <button class="vp-btn" (click)="rewind()" title="Rewind 10s">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
            <text x="7.5" y="15.5" font-size="5.5" font-weight="bold" fill="currentColor">10</text>
          </svg>
        </button>

        <button class="vp-btn vp-btn--play" (click)="togglePlay()" title="Play/Pause">
          @if (playing()) {
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
            </svg>
          } @else {
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M8 5v14l11-7z"/>
            </svg>
          }
        </button>

        <button class="vp-btn" (click)="forward()" title="Forward 10s">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/>
            <text x="7.5" y="15.5" font-size="5.5" font-weight="bold" fill="currentColor">10</text>
          </svg>
        </button>

        <span class="vp-time">{{ currentTimeStr() }} / {{ durationStr() }}</span>
      </div>

      <!-- Right controls -->
      <div class="vp-bar__right">
        <button class="vp-btn" (click)="toggleMute()" title="Mute">
          @if (muted() || volume() === 0) {
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M16.5 12A4.5 4.5 0 0014 7.97v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.796 8.796 0 0021 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06A8.99 8.99 0 0017.73 18L19 19.27 20.27 18 5.27 3 4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
            </svg>
          } @else {
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0014 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
            </svg>
          }
        </button>

        <input class="vp-volume"
               type="range" min="0" max="1" step="0.05"
               [value]="muted() ? 0 : volume()"
               (input)="onVolumeChange($event)" />

        <!-- Quality picker (HLS only) -->
        @if (qualityLevels().length > 0) {
          <div class="vp-quality-wrap" (click)="$event.stopPropagation()">
            <button class="vp-btn vp-quality-btn"
                    (click)="toggleQualityMenu()"
                    [title]="'Quality: ' + currentQualityLabel()">
              <span class="vp-quality-chip">
                <svg viewBox="0 0 24 24" fill="currentColor" width="15" height="15">
                  <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
                </svg>
                {{ currentQualityLabel() }}
              </span>
            </button>
            @if (showQualityMenu()) {
              <div class="vp-quality-menu" role="menu">
                @for (level of qualityLevels(); track level.index) {
                  <button role="menuitem"
                          [class.active]="currentQuality() === level.index"
                          (click)="setQuality(level.index)">
                    @if (level.index === -1) {
                      <svg viewBox="0 0 24 24" fill="currentColor" width="12" height="12" style="margin-right:5px;opacity:.7">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/>
                      </svg>
                    }
                    {{ level.label }}
                    @if (currentQuality() === level.index) {
                      <svg viewBox="0 0 24 24" fill="currentColor" width="12" height="12" style="margin-left:auto">
                        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                      </svg>
                    }
                  </button>
                }
              </div>
            }
          </div>
        }

        <!-- Fullscreen -->
        <button class="vp-btn" (click)="toggleFullscreen()" title="Fullscreen">
          @if (fullscreen()) {
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>
            </svg>
          } @else {
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
            </svg>
          }
        </button>
      </div>
    </div>
  </div>

  <!-- Big center play button when paused -->
  @if (!playing() && !srcError()) {
    <button class="vp-center-play" (click)="togglePlay()">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M8 5v14l11-7z"/>
      </svg>
    </button>
  }

  <!-- Source error state -->
  @if (srcError()) {
    <div class="vp-error">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <p>This video could not be played.</p>
    </div>
  }
</div>

<div class="pm-backdrop" (click)="closed.emit()" (keydown.escape)="closed.emit()">
  <dialog class="pm-card" open (click)="$event.stopPropagation()" (keydown)="$event.stopPropagation()">

    <!-- Close -->
    <button class="pm-close" (click)="closed.emit()">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    </button>

    @if (success()) {
      <!-- Success state -->
      <div class="pm-success">
        <div class="pm-success__icon">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
        </div>
        <h3>Payment Successful!</h3>
        <p>Starting your movie now...</p>
      </div>
    } @else {
      <!-- Movie header -->
      <div class="pm-header">
        <img [src]="movie.thumbnail_url" [alt]="movie.title" class="pm-poster" />
        <div class="pm-info">
          <h3 class="pm-title">{{ movie.title }}</h3>
          <span class="pm-price">RWF {{ movie.price | number }}</span>
          <span class="pm-duration">{{ movie.duration_minutes }} min</span>
        </div>
      </div>

      <hr class="pm-divider" />

      <!-- Payment form -->
      <div class="pm-form">
        <p class="pm-label">Pay with Mobile Money</p>

        <!-- Phone input -->
        <div class="pm-field">
          <label class="pm-field__label" for="pm-phone">Phone Number (MTN or Airtel)</label>
          <div class="pm-field__row">
            <span class="pm-field__prefix">+250</span>
            <input
              id="pm-phone"
              class="pm-field__input"
              type="tel"
              inputmode="numeric"
              placeholder="07X XXX XXXX"
              maxlength="13"
              autocomplete="tel"
              [value]="phoneNumber()"
              (input)="onPhoneInput($event)"
              [disabled]="loading()" />
          </div>
          <span class="pm-field__hint">MTN: 078 / 079 &nbsp;·&nbsp; Airtel: 072 / 073</span>
        </div>

        @if (error()) {
          <div class="pm-error">{{ error() }}</div>
        }

        <!-- Pay button -->
        <button class="pm-pay-btn" (click)="pay()" [disabled]="loading()">
          @if (loading()) {
            <span class="pm-spinner"></span>
            {{ loadingMessage() }}
          } @else {
            <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
              <path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/>
            </svg>
            Pay RWF {{ movie.price | number }}
          }
        </button>

        <p class="pm-secure">
          <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14">
            <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
          </svg>
          Secure payment powered by PawaPay
        </p>
      </div>
    }

  </dialog>
</div>

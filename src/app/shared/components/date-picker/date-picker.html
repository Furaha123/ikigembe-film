<!-- Trigger button -->
<button
  type="button"
  class="dp-trigger"
  [class.is-disabled]="disabled()"
  (click)="$event.stopPropagation(); open.set(!open())"
>
  <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16" class="dp-icon">
    <path d="M9 11H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2zm2-7h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V9h14v11z"/>
  </svg>
  <span class="dp-label">{{ label() }}</span>
</button>

<!-- Dropdown panel -->
@if (open()) {
  <div class="dp-panel" (click)="$event.stopPropagation()" (keydown)="$event.stopPropagation()">

    <!-- Month / year navigation -->
    <div class="dp-nav">
      <button type="button" class="dp-nav-btn" (click)="prevMonth()" aria-label="Previous month">
        <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
          <path d="M15.41 7.41 14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
        </svg>
      </button>
      <span class="dp-nav-title">{{ MONTHS[viewMonth()] }} {{ viewYear() }}</span>
      <button type="button" class="dp-nav-btn" (click)="nextMonth()" aria-label="Next month">
        <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
          <path d="M10 6 8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
        </svg>
      </button>
    </div>

    <!-- Day-of-week labels -->
    <div class="dp-weekdays">
      @for (d of DAYS; track d) {
        <span>{{ d }}</span>
      }
    </div>

    <!-- Calendar grid -->
    <div class="dp-grid">
      @for (week of weeks(); track $index) {
        @for (day of week; track $index) {
          <button
            type="button"
            [class]="dayClass(day)"
            [disabled]="!day"
            (click)="selectDay(day)"
            (mouseenter)="hovered.set(day)"
            (mouseleave)="hovered.set(null)"
          >
            {{ day ? day.getDate() : '' }}
          </button>
        }
      }
    </div>

    <!-- Footer hint -->
    <div class="dp-footer">
      @if (!startDate()) {
        <span>Click to set start date</span>
      } @else if (!endDate()) {
        <span>Click to set end date</span>
      } @else {
        <button type="button" class="dp-clear" (click)="startDate.set(null); endDate.set(null)">Clear</button>
      }
    </div>

  </div>
}

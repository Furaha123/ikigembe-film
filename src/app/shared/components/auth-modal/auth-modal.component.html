<div class="modal-backdrop" (click)="dismiss()">
  <div class="modal-card" (click)="$event.stopPropagation()">
    <button class="close-btn" (click)="dismiss()" aria-label="Close">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    </button>

    <div class="lock-icon">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
      </svg>
    </div>

    <h2>Sign in to watch</h2>
    <p>Create a free account or sign in to start streaming your favourite movies and shows.</p>

    <div class="actions">
      <a class="btn btn-primary" routerLink="/register" (click)="dismiss()">Create Account</a>
      <a class="btn btn-outline" routerLink="/login" (click)="dismiss()">Sign In</a>
    </div>
  </div>
</div>

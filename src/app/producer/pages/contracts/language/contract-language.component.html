<div class="flow-page">
  <div class="flow-card lang-card">

    <div class="step-indicator">
      <span class="step done"></span>
      <span class="step active"></span>
      <span class="step"></span>
      <span class="step"></span>
      <span class="step"></span>
    </div>

    <div class="icon-wrap">
      <svg viewBox="0 0 24 24" fill="currentColor" width="32" height="32">
        <path d="M12.87 15.07l-2.54-2.51.03-.03c1.74-1.94 2.98-4.17 3.71-6.53H17V4h-7V2H8v2H1v1.99h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z"/>
      </svg>
    </div>

    <h1 class="flow-title">Select Language</h1>
    <p class="flow-subtitle">Choose the language for your Producer Distribution Agreement.</p>

    <div class="lang-options">
      <button
        class="lang-option"
        [class.selected]="flow.selectedLanguage() === 'en'"
        (click)="select('en')"
        type="button"
      >
        <!-- UK flag -->
        <svg class="lang-flag-svg" viewBox="0 0 60 36" width="36" height="22" shape-rendering="geometricPrecision" aria-hidden="true">
          <rect width="60" height="36" fill="#012169"/>
          <path d="M0,0 L60,36 M60,0 L0,36" stroke="white" stroke-width="7.2"/>
          <path d="M30,0 V36 M0,18 H60" stroke="white" stroke-width="12"/>
          <path d="M0,0 L60,36 M60,0 L0,36" stroke="#C8102E" stroke-width="4.8"/>
          <path d="M30,0 V36 M0,18 H60" stroke="#C8102E" stroke-width="7.2"/>
        </svg>
        <span class="lang-name">English</span>
        <span class="lang-check">
          <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5l-4-4 1.41-1.41L10 13.67l6.59-6.59L18 8.5l-8 8z"/>
          </svg>
        </span>
      </button>

      <button
        class="lang-option"
        [class.selected]="flow.selectedLanguage() === 'rw'"
        (click)="select('rw')"
        type="button"
      >
        <!-- Rwanda flag -->
        <svg class="lang-flag-svg" viewBox="0 0 60 40" width="36" height="22" shape-rendering="geometricPrecision" aria-hidden="true">
          <rect width="60" height="10" fill="#20B2CC"/>
          <rect y="10" width="60" height="10" fill="#FAD201"/>
          <rect y="20" width="60" height="20" fill="#008000"/>
          <!-- sun -->
          <circle cx="50" cy="5" r="3.2" fill="#FAD201"/>
          <line x1="50" y1="0.4" x2="50" y2="1.8" stroke="#FAD201" stroke-width="1"/>
          <line x1="50" y1="8.2" x2="50" y2="9.6" stroke="#FAD201" stroke-width="1"/>
          <line x1="45.4" y1="5" x2="46.8" y2="5" stroke="#FAD201" stroke-width="1"/>
          <line x1="53.2" y1="5" x2="54.6" y2="5" stroke="#FAD201" stroke-width="1"/>
          <line x1="46.7" y1="1.7" x2="47.7" y2="2.7" stroke="#FAD201" stroke-width="1"/>
          <line x1="52.3" y1="7.3" x2="53.3" y2="8.3" stroke="#FAD201" stroke-width="1"/>
          <line x1="53.3" y1="1.7" x2="52.3" y2="2.7" stroke="#FAD201" stroke-width="1"/>
          <line x1="47.7" y1="7.3" x2="46.7" y2="8.3" stroke="#FAD201" stroke-width="1"/>
        </svg>
        <span class="lang-name">Kinyarwanda</span>
        <span class="lang-check">
          <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5l-4-4 1.41-1.41L10 13.67l6.59-6.59L18 8.5l-8 8z"/>
          </svg>
        </span>
      </button>
    </div>

    <div class="flow-actions">
      <button class="btn-outline" (click)="back()">Back</button>
      <button class="btn-gold" (click)="continue()" [disabled]="!flow.selectedLanguage()">
        Continue
      </button>
    </div>

  </div>
</div>

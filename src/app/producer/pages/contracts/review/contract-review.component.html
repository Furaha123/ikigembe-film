<div class="review-page">

  <div class="review-header">
    <div class="step-indicator">
      <span class="step done"></span>
      <span class="step done"></span>
      <span class="step active"></span>
      <span class="step"></span>
      <span class="step"></span>
    </div>
    <h1 class="flow-title">{{ 'contracts.review.title' | translate }}</h1>
    <p class="flow-subtitle">{{ 'contracts.review.subtitle' | translate }}</p>
    <button class="download-btn" (click)="downloadPdf()" type="button">
      <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
        <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
      </svg>
      {{ 'contracts.review.download' | translate }}
    </button>
  </div>

  <div class="agreement-scroll" #scrollBody (scroll)="onScroll($event)">
    @for (section of contractText; track section.title) {
      <div class="agreement-section">
        <h2 class="section-title">{{ section.title }}</h2>
        <p class="section-body">{{ section.body }}</p>
      </div>
    }
    <div class="scroll-anchor"></div>
  </div>

  @if (!hasScrolledToBottom()) {
    <p class="scroll-hint">{{ 'contracts.review.scrollHint' | translate }}</p>
  }

  <div class="review-actions">
    <button class="btn-outline" (click)="back()">{{ 'contracts.review.back' | translate }}</button>
    <button class="btn-gold" (click)="continue()" [disabled]="!hasScrolledToBottom()">
      {{ 'contracts.review.continueBtn' | translate }}
    </button>
  </div>

</div>

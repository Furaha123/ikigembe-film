<div class="admin-login-wrap">
  <div class="login-card">
    <div class="card-header">
      <img src="/assets/ikigembe.log.png" alt="Ikigembe" class="logo">
      <h1>Admin Panel</h1>
      <p>Sign in with your admin credentials</p>
    </div>

    @if (errorMessage()) {
      <div class="error-banner">{{ errorMessage() }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">
      <div class="field">
        <label for="admin-identifier">Email or Phone</label>
        <input id="admin-identifier" type="text" formControlName="identifier" placeholder="admin@ikigembe.com">
        @if (identifier?.invalid && identifier?.touched) {
          <span class="field-error">Email or phone is required</span>
        }
      </div>

      <div class="field">
        <label for="admin-password">Password</label>
        <div class="input-wrap">
          <input id="admin-password" [type]="showPassword() ? 'text' : 'password'" formControlName="password" placeholder="Your password">
          <button type="button" class="eye-btn" (click)="showPassword.set(!showPassword())">
            @if (showPassword()) {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            } @else {
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            }
          </button>
        </div>
        @if (password?.invalid && password?.touched) {
          <span class="field-error">Password is required</span>
        }
      </div>

      <button type="submit" class="submit-btn" [disabled]="isLoading()">
        @if (isLoading()) {
          <span class="btn-spinner"></span> Signing in...
        } @else {
          Sign In
        }
      </button>
    </form>

    <p class="back-link">Not an admin? <a routerLink="/login">Go to viewer login</a></p>
  </div>
</div>

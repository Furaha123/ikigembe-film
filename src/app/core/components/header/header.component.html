<header [class.scrolled]="isScrolled()">
  <div class="left">
    <img width="72" src="/assets/ikigembe.log.png" alt="ikigembe-logo">
    <ul class="nav-list">
      @for (item of navList; track item.label) {
        @if (item.route) {
          <li><a [routerLink]="item.route" routerLinkActive="active">{{ item.label }}</a></li>
        } @else {
          <li>{{ item.label }}</li>
        }
      }
    </ul>
  </div>
  <div class="right">
    <button class="icon-btn search-btn">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <path d="m21 21-4.35-4.35"/>
      </svg>
    </button>
    <button class="icon-btn notification-btn">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2zm-2 1H8v-6c0-2.48 1.51-4.5 4-4.5s4 2.02 4 4.5v6z"/>
      </svg>
      <span class="notification-badge">3</span>
    </button>
    <div class="user-menu">
      <button class="user-menu-trigger" (click)="toggleDropdown($event)" type="button">
        <div class="avatar">{{ initials() }}</div>
        <svg class="dropdown-icon" [class.open]="showDropdown()" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
          <path d="M7 10l5 5 5-5z"/>
        </svg>
      </button>

      @if (showDropdown()) {
        <div class="dropdown-menu">
          <div class="dropdown-user">
            <div class="avatar-sm">{{ initials() }}</div>
            <span>My Account</span>
          </div>
          <hr class="dropdown-divider">
          <a class="dropdown-item" [routerLink]="'/profile'">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            Profile & Settings
          </a>
          <hr class="dropdown-divider">
          <button class="dropdown-item logout" (click)="logout()" [disabled]="isLoggingOut()">
            @if (isLoggingOut()) {
              <span class="logout-spinner"></span>
              Signing out...
            } @else {
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
              </svg>
              Sign Out
            }
          </button>
        </div>
      }
    </div>
  </div>
</header>
